body:
  text: 竹雲題跋目錄類二金石之屬提要臣等謹案竹雲題跋四卷國朝王㴻撰皆其臨摹古帖題跋裒合成編㴻本工書故精於鑒别而於源流同異考証尤詳如論西岳華山廟碑郭香察書為校勘刻石鍾繇薦季直表祝希哲誤作焦季直及繇結御與史異蘭亭序派别聖教序始末王羲之裹鮓帖釋文誤作十九字瘞鶴銘非顧况亦非陶宏景同州聖教序稱龍朔三年時禇遂良卒已五年魏栖梧善才寺碑偽題遂良名遂良髙士贊誤題永徽二年為甲寅岳珂䟦寶章集誤以竇􅡄為竇泉朱巨川誥非徐浩書李陽冰縉雲城隍廟碑篆文訛字靈飛經非鍾紹京書裴耀卿等奏狀非耀卿書唐明皇批荅中桓山之頌乃用王獻之事顔真卿宋廣平碑考異乞米帖所稱太保是李光弼非光顔爭坐位帖年月顧炎武金石文字未考祭姪文告伯父文結䘖與史異江淮帖為集字偽作李紳告身與史異葉慧明碑非韓擇木書撰皆引據有根柢惟諸禇遂良書出於曹全碑則殊臆度此碑近代始出明以前未有言之者也又排鄭簠蔣衡而自稱腕有元章鬼亦未免文人相輕之習焉乾隆四十二年五月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a1e8580afb78b0bd0bcf09edbf66b907970b7a6dc3968bad760820d4c86f7127
