body:
  text: 竹雲題跋卷二吏科給事中王澍撰王右軍十七帖唐摹硬黃十七帖前明神廟時藏臨邑邢太僕子願家子願手自鉤摹刻石來禽館為天下十七帖第一比之世俗流傳本少一十五行蓋脫失也此宋搨全本為錫山秦氏所摹不唯與世俗流傳本天地懸隔并與唐摹亦微不同如吳之為養之為不之為樓之為筆法全異余見十七帖不下百數來禽館刻本外唯此為最爰取恥菴王孫所贈白宋箋精摹一本流示子孫十七帖多言蜀中事自昔相傳以為蜀郡太守書黃伯思云淳化第八卷有周益州送此卭竹杖帖十七帖中亦有去夏足下所致卭竹杖皆至帖則知此蓋與周益州者益州名撫字道和穆帝永和三年桓溫攻成都李勢降以撫為益州刺史益州平封建成公在官十年卒則知此草許帖多與益州書雖未必盡然要之與益州者居半也又世傳右軍帖多吊唁語此卷唯有老婦疾篤等一二帖餘皆無之昭陵當時收右軍帖最多每以丈有二尺為卷因類其談蜀事者為一卷而以他帖詞語藴籍者足成之遂為右軍烜奕有名之書以卷首有十七字故名十七帖非數止十七也淳化帖右軍凡三卷僞作十居三四元章辨别淄澠較若鳬雁固緣識力之精然孔子七十從心不踰陽貨雖貌似然苟非匡人未有不一望立辨者右軍雖鳳翥鸞翔實則左規右矩唐文皇所謂烟霏霧結狀欲斷而還連鳳翥龍蟠跡似竒而反正者於十七帖便可見之來者但以此為之準繩稱量淳化即真僞可一見而決何事一波一磔研同索異始標定力乎草書如何守正圓中規方中矩如何盡變無圓而不矩無方而不規如何用力從規矩入從規矩出如何盡變一步不離步步縱合至於能縱合斯謂從心不踰右軍化不可為其底藴不過些子顛素只此些子差所以永墮異趣王右軍王略帖東觀餘論云晉穆帝永和十二年秋桓溫破姚襄于伊水遂入洛時將以謝尚鎮之屬病不行此帖所叙桓公摧敗羌賊及喜仁祖小差正當時也是時逸少去㑹稽內史已嵗餘方遁跡山水間宜不復以世務經懷而此書乃歎宣武之威略悲舊都之始平憂國悲時志猶不息蓋素心如此惜其一憤逺去使才猷弗光于世獨區區遺翰見寶後人覽之深為興歎長睿此跋深得右軍之心無復加矣董氏戲鴻所刻右軍書多據曹之格寶晉帖入石此帖亦本曹氏而米老標題既有異同帖後楊少師等題識又俱脫去今年秋余到維揚從凃氏借得寶晉本細意臨摹收之積書巖帖中以補戲鴻之闕此右軍真蹟米老據舷欲墮乞得于韓持國者也既自為之贊又請諸同志者交為之贊一贊不已且再三贊之又特自書其後其珍重愛玩之意纒綿切至可見矣世俗刻本但存米贊劉涇黃誥等贊皆無之不知後五贊亦米老書也康熙乙丑館於毗陵從市上得宋搨全本驚喜之至不殊米老得右軍真蹟時嘗為友朋臨之忽已二十年計所臨者不可勝數未知與此優劣何如也唐僧懷仁集王右軍書聖教序古良常王氏祕玩聖教序有明內府故物天下行書第二吾家法書第一嘉靖間初歸顧汝和中舍有文五峰兩跋繼歸王酉室吏部有文待詔唐解元等跋明季為孟津王覺斯所收後歸卞令之少司冦司冦歿家業中落遂為吾友夏光祿金輅所得康熙後壬寅秋八月光祿病持以質藥遂以白金百二十銖易之碑凡一千九百有二字剝蝕者七微損者六搨時糢糊及裱工剪損余以金筆補之者又七凡二十字餘皆完好無闕贊曰右軍為書凌今轢古聖教一出劇跡咸聚仰配蘭亭有目共覩維此宋本聖教之冠幽光油然生香不斷數千百年神明呵護以及于余罔有塵汚亦願寸靈默持此帖授受得所永絶灰劫即如僕身享此帖焉于萬斯年宣和書譜載懷仁書二聖教居首題語云聖教序有二本一褚遂良書一則僧懷仁集羲之諸行字所成也二本皆為後學宗楷學羲之書者必自懷仁始黃長睿東觀餘論云書苑言唐文皇製聖教序時都城諸釋諉宏福寺懷仁集右軍行書勒石纍年方就右軍劇跡咸萃其中今觀碑中字與右軍遺帖所有者纖微克肖書苑之說信然然近世翰林侍書輩多學此碑學弗能至了無髙韻因是目其書為院體由唐吳通微昆弟已有斯目故今士大夫玩此者少然學弗能至者自俗耳碑中字未嘗俗也二書之推重如此自唐以來士林甚重此碑匪直興福寺隆闡法師等碑為顯效其體即李北海張司直蘇武功亦皆從此奪胎自有院體之目於是光熖遂殺以故宋元以來黃米諸巨手皆弗道乃獨宣和書譜黃長睿始為吐氣耳至有明宏正間士大夫始復重此碑購求一本往往傾囊倒篋以為難得雖已斷者購之猶數十金蓋至於今二三百餘年而聖教石刻遂至斷闕剝蝕幾於無字可尋矣此本榻法精良古香滿紙字畫芒鎩纖毫畢具自余在京時十餘年所見宋搨聖教凡百十本未有及此者信聖教中絶品也按劉軻大遍覺法師碑𤣥奘俗姓陳氏河南緱氏人年十三出家於洛隋季依髙祖於晉陽貞觀三年往遊西域得大乘等經六百五十七部十九年還京師敕就宏福寺翻譯二十年進所翻經表請題序序成於慶福殿令宏文館學士上官儀對羣僚讀之二十二年夏髙宗又御製述聖記十二月始自內出髙宗咸亨三年建碑自貞觀草二年至咸亨三年凡歷二十五年搜羅移搨不知費幾許工夫幾許心力乃得完正其前唯定武蘭亭文皇所刻自大內者淵渾肅穆風力少勝其他一切右軍石刻無與匹者蓋當時右軍墨蹟盡歸內府收藏既富摹搨復工冠冕藝林模楷百代有以也懷仁集聖教以蘭亭為主而輔以官奴其餘增損裁成悉以為準故一一中規中矩為千古行書之宗董宗伯據舍利塔碑欵有習右軍書之語以為集之為習正合定為懷仁自運竊謂懷仁若果能作如此書便當逺出歐褚諸公上不應寂寂無聞乃觀戲鴻所刻懷仁書兩種筆弱韻微比于聖教譬若碔玞之於美玉不可同年而語矣又况碑中字有相同者有合成者有拆開者非出鉤摹必不能纖微惟肖如此評者遂謂如許右軍劇跡咸萃其中不知右軍之在唐初猶文董之於今日雖集十聖教亦無不足若以今日觀右軍論故宜爾矣聖教序不知斷自何時僕在京師嘗于閩中許氏借觀趙文敏臨本凡斷處字皆闕則知自元以前蓋已斷矣斷者不足言其未斷者的為宋搨無疑也余見未斷本以百數唯髙平楊氏靜海髙氏北平胡氏吳門繆氏所藏鋩鎩宛然足為聖教甲觀然比之此本則如碔玞之於美玉矣右軍書登無上神品聖教序為右軍書中無上神品此搨又聖教中無上神品余家藏古搨三十餘種以此為長行則隨行倦則作枕從我所好玩而老焉平生志願足矣欵稱奉敕潤色乃潤色經文非潤色其字也當時既敕元奘就宏福寺翻譯遂下詔令太子太傅尚書左僕射燕國公于志寧中書令來濟禮部尚書許敬宗黃門侍郎薛元超中書侍郎李義甫杜正倫看閲隨事潤色蓋恐譯經時文義或有未安故特敕于志寧等潤色之唐代事佛最謹佛典特為矜重故宰相必帶譯經潤色使銜至宋初猶因之未改盲人不解此義遂謂右軍書法一壞於懷仁之鉤摹二壞于于志寧等之潤色豈不可笑集右軍書為碑者自唐以來不可一二數若吳文斷碑絳州夫子廟碑周孝侯碑皆絶有名於時唯吳文碑風力遒雋為不失右軍手意餘者皆不足觀然吳碑雖摹搨至精而嚴謹有餘風度不足比於聖教則氣象之大小相懸千里矣當時去右軍未逺真蹟捆萃極于天府又得懷仁妙手積二十餘年之工宜其直入神解足稱右軍嫡嗣下此相去滋逺但從石本摹取輾轉移搨愈逺而愈失真矣郭引伯稱聖教謂較定武蘭亭相去千里不免推許太過定武瘦不賸骨肥不賸肉和明肅括無美不臻為右軍石刻第一聖教風神朗暢過於定武然所以不及定武者正在此矣此中消息未可明言非心解人未易窺此祕者至于南宋蘭亭諸刻以及淳化大觀方之聖教譬猶髙曾之視子孫尊卑闊絶不敢仰視矣定武蘭亭因山谷老人一語遂自宋至今珍逾拱璧聖教以有院體之目終宋之世無齒及者然定武名重當時至萬方氊蠟千手覆刻了乏形似當南宋時石已毁廢不可究詰聖教序至今巋然猶在關中天假院體一語為千載留神蹟嘉惠後學泃不可謂不幸然自明以來鎚擊之聲晝夜不絶行且剝落殆盡為今日之定武蘭亭矣慨念神蹟日湮得此墨王焉敢不倍加珍重蘭亭覆刻南宋以來多至數千聖教才數十種耳然蘭亭雖轉相摹仿數百年來人皆珍之獨聖教覆本了乏勝趣良由蘭亭千載矜重摹刻時不敢苟且故至今無下搨聖教則唯賈人率意重刻為衣食資既乏勝情又鮮妙手所以筆趣頓置了不足觀又蘭亭定武本存於世者絶少但得舊搨便交相矜尚聖教宋本往往多在人間雖有佳刻亦不為重况刻又不佳乎聖教真僞至難辨鑒賞家多以深字水傍作兩啄者目為原本然吾見覆本多矣其水傍作兩啄者亦不少以此定真僞究不足據惟佛道崇虛道字首二筆中斷遍檢覆刻皆絶無有以此為定百無一失要之此亦只為初學者立法耳看得熟時便一展卷如别黑白正不俟研同索異始能識别也往在京時客有持宋經生書聖教序來者末有聖教後記載有𤣥奘求序表謝序表及文皇兩手敕其序𤣥奘顛末與劉軻所撰大遍覺法師碑不異輒命蔣生師淵録之已而又謂師淵若以此仿懷仁之集右軍書以麗聖教之後亦足為翰墨一竒師淵于是博搜遍考竭兩月移搨之力乃就時余方患赤眼連綿數載未得臨寫及眼病少已而余改官吏部朝夕承事乾清門又不暇以為然輒以筆硯攜入官署但有一隙便精意作數十字積力久之乃以成册攜之而南過淮隂程生蓴江荔江以為得未曾有遂為余勒石而攫墨本以去還念前勞不忍遽舍附記于後要之亦一段勝事矣氊蠟之法宋時最精往見儼齊大司農家所藏大觀帖數本墨光如鑒古香滿紙嘆為帖中墨王唯余此本足相妃匹屈指平生所見宋搨古帖不下千種皆無有及此者曩年刻得米老西園雅集記自以宣德鏡光箋小華山人龍柱墨窮日之力氊搨六十餘次自意致精及較此搨尚覺墨色淺淡即其他更不足論已舊史𤣥奘傳𤣥奘年五十六以顯慶六年卒顯慶六年即龍朔元年也由龍朔元年上推五十六當生於隋煬帝大業二年劉軻三藏法師塔銘則云𤣥奘十三出家顯慶五年二月五日卒年六十九由顯慶五年上推六十九當生於隋文帝開皇十二年以仁壽四年出家唐髙祖武德元年乃從髙祖於晉陽太宗貞觀三年自請於帝往遊西域於時年三十八歷十七年以貞觀十九年還京師年五十四又十五年當髙宗顯慶五年年六十九卒於故玉華宫肅成院其徒令檢以三藏傳記請為塔銘比於史書故當無誤可據若據史書五十六年之語則十三出家當在髙祖武德元年與其所稱大業末出家者自相矛盾矣文皇之序降於貞觀草二年八月文皇以是年二月幸玉華宫十月乃還則此序自玉華宫出也又塔銘稱天皇大帝居春宫以草二年夏六月製述聖記則亦當以八月同降自玉華宫故於述聖記之末總而記之曰貞觀草二年八月三日內出也又本傳顯慶元年奉敕潤色經文者凡六人碑只五人無杜正倫本傳又有助加翻譯三人碑亦無之當由史誤序記雖皆有總將三藏要文凡六百五十七部譯布中夏之語然當貞觀時所翻經論尚未就惟西域記十二卷先成文皇及髙宗先作記序賜之顯慶初乃更令于志寧等詳加潤色踵而成之耳翻經潤色皆由奉敕集書則懷仁所自為故自貞觀草二年至咸亨三年歷二十五年乃成不稱奉敕也後記不知出自何人手蓋亦唐人所作宋經生所書余以康熙六十年見自京師中有𤣥奘求序表謝序表及文皇兩敕皆世所未有因屬蔣生師淵仿懷仁例集右軍書經年乃就及余司封吏部官居多暇乃臨一本以之而南過淮隂程生蓴江取以勒石乃更臨一本藏之王右軍快雪帖右軍快雪帖米老所收與趙魏公所跋各是一本雖字跡相同要之定非一帖不獨趙本下有君倩二字為可證其非是也又董思白言快雪帖相傳為右軍正書此在真行之間米亦有此論則快雪帖已有三本矣果據何者是乎正書舊有以霜寒帖誤作快雪之語可不復論米趙兩本必有唐人雙鉤一本以其廓填精妙不可辨識故米趙二公據以為真耳王右軍裹鮓帖裹鮓帖乃右軍晚年書筆力沈徑獨最他帖故薛紹彭贊有右軍為書暮年更妙裹鮓一出衆帖咸少之語真跡在北平孫少宰承澤家刻石知止閣又雍正二年承事乾清門竹齊佟太保示余趙文敏所臨三本一欵子昂二欵松雪道人三帖皆精妙幾可奪真遂發興以孫氏所刻真跡臨得一紙以趙本臨得三紙三年夏京師霖雨公事畢一步不能出雜取舊紙以意書之聊用破悶凡二百許紙四年南還於揚州凃氏借觀寶晉宋本後刻薛紹彭贊及米元章札極精妙又臨一紙余於裹鮓帖愛之深而學之篤如此既自笑而行自喜也帖凡一十八字致君上玩其筆法當是今字朱竹垞釋作一一作一十九字誤也十八字凡五句裹鮓味佳句今致君句所須可示句勿難句當以語虞令句言裹鮓味致佳今以致君若復須此可更示我勿欲之而不言也難當如忿斯難之難去聲當以語虞令者言不特我致君并當以語上虞令亦致君也古人短札古雅簡到乃如此若出今人手不知費如許紙筆矣王大令洛神十三行此梁溪安氏所藏唐摹墨蹟卲曾訓别以油箋摹得一紙余從京師見之離方遁圓不守繩墨而自作勝概全得禊序妙處定從子敬真本勾取得之唐人為法度所窘不能及也或者目為褚公所臨褚公天材超越其摹禊序可謂具體而微及其自運則但有右軍之一體爾此本變化詭異意在法外謂褚公所摹則可謂褚公所臨則不可十三行傳本不一要未有能及此者此有天工正未可以人力爭也今安氏真本久已失去余僅從卲本摹之王大令論謝太傅表大令此表世罕傳本唯卞司冦所刻帖中有之當時唐搨本在其家曾於京師瞥得一見忽便持去心甚恨之今對刻帖追摹一本亦略得其意王大令桓山殘碑大令桓山碑止存六字潘駙馬跋以為桓溫破姚襄是也晉穆帝永和十二年秋八月桓溫破姚襄於伊水遂至洛時晉偏安江左桓溫此舉中原有克復之機功莫大焉樹碑頌之固其宜也索靖月儀章李嗣真曰靖有月儀三章觀其趣尚大為遒竦米元章謂月儀不能佳只唐人耳無晉人氣格董廣川所得十一章稱其筆畫徑密他人不能睥睨殆唐人臨寫近似黃長睿亦以月儀為贋物余竊以月儀為幼安真蹟者固非以為唐人書者亦過觀其文字卑靡殆齊梁間人所為即其書雖乏晉人淡古風韻亦無唐人方幅氣習亦應出齊梁間人手余曾見齊梁碑刻數十種筆法峭徑形貌雖不同精神正與此合以其近似靖書故目以為靖耳楊義和內景經右臨本晉楊羲字義和黃素黃庭真跡曩為吳郡韓敬堂宗伯所藏吾家損菴先生借摹入鬱岡帖康熙丙申三月余得自京師辛丑五月以贈吾友江西裘魯青者也按陶隱居真誥翼真檢云晉哀帝興寧二年太嵗甲子紫虛元君上真司命南嶽魏夫人下降丹陽句曲山以上清真經授弟子琅琊王司徒公府舍人楊義使作𨽻字寫出以傳護軍長史句容許穆并弟三思上計掾二􅔘許又更起寫修行得道宋徽宗題為王羲之書黃長睿東觀餘論云逸少以晉穆帝升平五年卒是在嵗之辛酉後二年為哀帝興寧二年甲子始降黃庭於世安得逸少豫書之故米芾以為六朝人書趙孟俯直目為楊羲書吾家損菴亦云若非楊君始寫之本即是許掾重書然究不能定為何氏之作按真誥云三君手跡楊書最工不今不古能大能細大較雖祖效郤法筆力規矩並於二王掾書乃學楊而字體徑利偏善寫經長史章草乃能而正書古拙故不寫經也今此經字體閒曠飄飄有仙氣與二許徑利古拙者不合隱居所謂不古不今乃正得之定當為義和書述書賦稱其方圜自我結搆遺名如舟楫之不繫混寵辱以若驚故董其昌大書正名曰晉上清真人楊羲字義和書以神仙之跡不繫時代直置右軍之前推重可謂至矣獨惜其未勒全文耳曩真跡在余處時曾囑蔣生師淵摹一本今以摹本追擬真跡臨之知褚登善書法淵源於此大是有㑹爾梁瘞鶴銘圖以今現存字圖之江隂真宰丹陽外仙尉夆山真君真侣瘞爾亠洪流前固臿爽塏勢掩華亭爰集唯髣佛事亦微厥土唯寧波蕩相此胎禽芈表留山之下仙家石旌事蒃銘不朽詞曰未遂吾羽也乃以𤣥黃朱上白董廣川書跋載南陽張嶨字子厚所記瘞鶴銘計其完書蓋九行行之全者率二十五字而首尾不預焉余按既首尾不預則叙三行銘四行僅七行耳九字蓋誤今如張所記以二十五字為準第一行闕二十字第二行闕一十六字第三行末原文短二字僅闕九字第四行闕一十七字第五行闕一十三字第六行闕一十六字第七行原文六字今存四字僅闕二字總計存字八十闕字八十有九共一百六十有九字要之此亦只按其位次約略計之當時就石書銘字之疏密蓋不可知究未可據以為定也瘞鶴銘考瘞鶴銘舊在焦山西南觀音庵下濱海崩崖亂石間春夏水漲石沒不可搨秋冬水落始可摹取康熙壬辰冬陳滄洲使君閒居京口徙置山上千年古跡久淹於蛟宫鼉穴者一旦復出人間然存字無幾又前人考證亦復互有同異今以出水所存字為準其已經剝蝕轉相傳疑者各以次具列疑以存疑蓋其慎也文左行題名一行撰書名號一行序三行銘四行後欵三行凡一十二行原文就崖書石故其行之疏密字之多寡大小俱不整齊又嵗久磨滅不可知其字數宋邵資政以來諸公以意考證次為全文究竟是非莫辨皆所謂不知而作吾無取也原石凡四凷左第一凷二行全字四半字二中上一凷六行全字二十五半字四中下一凷三行全字十六半字一右一凷三行全字十一半字二原刻凡六十有五字左下一凷宋人補刻三行全字十四半字一凡一十五字今共存全字七十半字十凡八十字第一行前人考次大書瘞鶴銘三字稍偏左旁注有序二字凡五字張力臣本鶴字猶存今全闕第二行前人考次華陽真逸撰上皇山樵書凡十字分兩截低四五字書張力臣本猶存撰字上皇字今唯上字全皇字存上半序三行前人考次互有同異不可定其字數第一行金山經􅍥本鶴壽不知其紀下闕一字邵資政張子厚本壬辰嵗得於華下闕一字張力臣本上半原刻猶存嵗得於華四字下半宋人補刻猶存亭甲午嵗化于朱方天其十字今本上四字華字未闕下十字止存一朱字第二行卲資政張子厚本未遂吾翔下闕一字奚奪下闕一字金山經庋本奚奪下有余仙鶴三字張力臣本中上石猶存未遂吾翔四字下半宋人補刻猶存之遽也乃裹以𤣥黃之幣藏于兹十三字今本上四字翔字不全下十三字止存也乃以𤣥黃五字第三行卲資政張子厚本仙家無下闕四字輟耕録作仙家無隱金山經庋本并無仙家二字竟作故立石旌事今仙家二字現存經庋本誤又邵資政張子厚本我下竹頭字不全下邵作故立石旌事篆銘不朽張作旌其事今旌事篆銘四字現存張本誤張力臣本中上石猶存山之下仙家五字下半宋人補刻猶存故立石旌事篆銘不朽詞曰十一字今本上五字如舊下少故立二字僅存九字耳銘四行前人考次異同尤多不可究詰金山經庋本更顛倒錯亂不足論第一行相此胎禽四字現存邵資政本作相彼胎禽誤又邵資政張子厚本浮丘下闕二字言爾下闕五字去鼓下闕一字表留下闕二字輟耕録浮丘著經下作乃徵前事我傳爾銘余欲無言爾其藏靈陳氏玉烟堂本作乃徵前事出於上真余欲無言紀爾嵗辰俱不足據張力臣本中上石猶存相此胎禽浮丘六字下半猶存華表留形義五字今本上半止有五字無丘字下半華字不全止存留表二字第二行邵資政張子厚本解化下闕五字廠字不全下又闕五字張本作闕一字微𡨕下邵張本俱有爾將何之解化六字輟耕録竟作解化唯寧今唯寧上厥土字現存輟耕録誤金山經庋本微冥下有西竹法里宰耳嵗辰鳴語解化浮丘去莘左取曹國右割荆門六句不唯臆造無據并與原石地位多寡亦迥不相符而張力臣以左取曹國四字補右割荆門上汪退谷以西竹法里四字補厥土唯寧上皆屬臆造不足據張力臣本中上石猶存唯髣佛事亦微六字下半猶存厥土唯寧後蕩六字今本上半微字不全餘如舊第三行石本洪流二字現存邵資政作洪波誤扃石下邵張本俱作五字不全又闕八字金山經庋本作我欲無言爾也何明輟耕録作右割荆門歷下華亭皆不足據玉烟堂本作未下華亭亦無考今石本華亭上爽塏勢掩四字現存知邵張諸本之皆誤也汪退谷以左取曹國右割荆門山隂爽塏十二字為原石定位亦是臆說輟耕録以爰集作奚集乃筆誤不足辨張力臣本中上石猶存洪流前固重五字下半猶存爽塏勢掩華亭爰集八字今本上半存洪流前固四字重字不全下半如舊第四行邵資政張子厚本瘞爾下闕兩字注云或但止於此未可知金山經庋輟耕録諸本皆有作銘二字按文義此當是至經庋本作銘下有宜直視之唯將進寧二句荒謬尤甚張力臣本止存真侣瘞爾四字耳爾字不全今本同後欵邵資政張子厚本止丹陽真宰四字注不知其次今石三行現存第一行首二字不全下存徵君二字第二行丹陽外仙尉五字第三行江隂真宰四字皆全則知邵張皆憑搨本流傳未嘗親見石刻故不知其次至金山經庋以仙作僲真宰下多立石二字陳本因之而於夆山徵君上作上皇山樵人逸少書八字尤謬妄可笑蓋緣潤州圖經以為王右軍書故妄意增入耳黃山谷以瘞鶴銘為右軍書其書遺教經後云頃見京口斷崖中瘞鶴銘大字右軍書其勝處乃不可名貌又云瘞鶴銘斷為右軍書使人不疑歐薛顔柳書最為端徑然才得瘞鶴銘髣佛唯魯公宋開府碑瘦健清拔在四五間蘇子美詩亦有山隂不見換鵝經京口新傳瘞鶴銘之句皆以此為右軍書唯黃長睿東觀餘論云王逸少以晉惠帝大安二年癸亥嵗生年五十九至穆帝升平五年辛酉嵗卒則成帝咸和九年甲午逸少方三十二至永和七年辛亥嵗年四十九始去㑹稽而閒居不應三十二年已自稱真逸董廣川亦云其時未嘗至朱方華陽又非其郡邑所望不得以此為稱以是考之此銘決非右軍書明矣歐陽永叔初謂此銘是顧况書云華陽真逸乃顧况道號銘其所自作又云不敢遂以為况以碑無年月不知何時疑前後有人同斯號者也董廣川云顧况卒于貞元末當元和七年為壬辰九年為甲午良已不及若上推壬辰為天寶十一載况尚兒稚其號華陽子蓋自貞元以後皆不合於此余于崖上得唐人詩詩在貞觀中已刻銘後則銘之刻非顧况時可知據此則歐陽以為顧况者決非也黃長睿斷然以此銘為陶隱居書云審定文格殊類陶宏景陶宏景自稱華陽隱居今曰真逸者蓋其别號又其著真誥但云己卯而不著年名其他書亦爾今此銘壬辰嵗甲午嵗亦不書年名此又可證壬辰者梁天監十一年也甲午者十三年也隱居以天監七年東遊海嶽權駐㑹稽永嘉十一年始還茅山十四年乙未嵗其弟子周之良仙去為之作傳則十一年十三年正在華陽矣馬子巗陶九成皆以長睿之說為然然余按前欵云華陽真逸撰上皇山樵書則隱居乃撰文之人不得遽以為隱居所書又可知矣汪退谷中允云書撰姓氏本無可考既非右軍亦非宏景即華陽真逸與華陽隱居偶同道號亦秖可懸擬為宏景之文不當直定為宏景之書其書者固自稱為上皇山樵何從知其姓氏而一時道流皆各自别銜如真宰仙尉徵君即銘辭所謂真侣是也諸君並髙世慕道匿迹逃名更安可强指其人退谷此論信可謂老眼無花直舉數百載聚訟一筆掃盡當時此銘就石作書行之疏密字之大小且不能齊一即其為書未必匠意可知又石理粗頑刻時恐未能盡善兼之千載以來水汩石泐不免鋒頽穎秃非復當時舊觀自歐陽公黃山谷盛稱之于是鶴銘聲價比於蘭亭遂至諸家刻舟求劔殆同聚訟竊謂此銘當時既不著年號又不列姓名深自晦匿不欲稍見蓋不唯處亂世之末流匿跡逃名唯恐不密而諸君之髙世慕道鴻飛冥冥其所矜尚蓋已可知又安從得其姓氏即果得之亦迥非諸公之志况百千聚訟究屬茫昧竟不如疑以傳疑猶為得其本來也至其書法雖已剝蝕然蕭疏淡逺固是神仙之跡退谷所謂字體寬綽具古𨽻鋒稜雖刓精光瑩著分兩正得或者推許太過竟謂筆法之妙可為書家冠冕殆過也黃長睿言石頑難刻且為水泐故字無鋒穎若拙筆書者然昧者從而仿之深可一笑可謂知言者矣此銘舊在焦山下崖江流亂石間非俟霜降水涸布席仰卧即不可搨故人間難得近日滄洲使君拽致山上搨之為易然正恐自此以後無鶴銘矣滄洲為功於鶴銘甚大其為害於鶴銘亦復不小余恐其非久即毁以雍正六年秋七月特遣從事孫龍往焦山搨一本并滄洲新刻石亦搨以來行將手自裝界書跋于後以垂永久銘後題識唐有王瓚詩宋陸放翁題名瓚詩在銘側小石放翁題在未至銘數十步崖上皆未及搨他日舟至焦山定當手自搨之又潤城蔣亦厪于北固得米老題字云仲宣法芝米芾元祐辛未孟夏觀山樵書凡十有六字亦左行字類鶴銘乃從來未有者老友蔣拙存以一紙贈余特附列銘後以為絶觀竹雲題跋卷二
