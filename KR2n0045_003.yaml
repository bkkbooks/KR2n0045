body:
  text: 竹雲題跋卷三吏科給事中王澍撰歐陽率更醴泉銘筋骨血肉精神氣脈八者全具而後可為人書亦猶是俗子作書但有血肉都無筋骨墨豬爾髙手矯之而過遂至枯朽骨立所謂楚則失矣齊亦未為得也每見為率更者多方整枯燥了乏生韻不知率更風骨內柔神明外朗清和秀潤風韻絶人自右軍來未有骨秀神清如率更者醴泉銘乃其奉詔所作尤是絶用意書比于雍師塔銘肅括處同而此更朗暢矣余為人臨自南北來凡數十本多欲追取其風姿不徒貌其形似五輯多元賞知必契余斯語虞永興破邪論敘虞永興書筋力內涵風姿外朗如有道之士世人不能一毫嬰之獨破邪論序筆韻清逈與率更為近然自宋迄今摹刻以百數亡有佳者今所見唯宋僧希白潭帖所刻略得筆意余兹所臨亦但據潭帖追摹未知究與永興當否也歐陽蘭臺道因法師碑歐禇兩家書多自𨽻出而率更得之尤多故風骨遒徑如孤峯峭壁有不可犯之色蘭臺一稟家學作書多用此法但時出鋒稜每以峭快斬截為工則不免筋骨太露乏和眀渾徑之度耳余此書參取率更風韻損其圭角出以溫雅以退為進以離為合乃適得其正凡臨古人書不可不知此語禇摹蘭亭真迹右禇摹墨迹拙存老友自秦中摹得之後有米老詩一首蓋是寶晉齋中珍祕之物余按禇公書昔人稱其字裏金生行間玉潤如瑤臺嬋娟不勝羅綺其所摹蘭亭動多姿態比於定武則歐為有道正士而禇則絶代佳人矣此本筆力縱橫排奡有不可控勒之勢與尋常禇本不同疑是米老所作託諸禇公以傳者蓋風姿朗秀禇米所同而禇則淵靜此較飛動時代為之在作者亦不自意其然也後詩寄言好事但賞佳俗説紛紛那有是亦明以後生求禇者為好竒可笑蓋已略逗端倪矣余此語初似不經諦審實確未知吾拙存謂之然否拙存曰當時有米臨禇墨迹絶類潁上本此之蒼渾非漫仕所能為也且快然自足快字禇本乃重筆牽過至米臨竟作怏字不知當時何故不留心乃爾羣字直乃改筆今聖教集字似飛白亦可疑且諸本押縫無僧字米臨則有之想其臨本不一余所見二本同時確有異同姑存俟參訂禇摹蘭亭米老得禇摹墨迹對紫金浮玉裁為袖珍每一行分作兩行為五十六行手裝成卷今此卷尚存海寧陳宗伯家往在京時曽從借觀自七行盛字起至九行盛字止凡闕三十五字蓋董宗伯質於陳時所掣去者也余以禇摹别本補之其行列亦仍還二十八行之舊米老剪碎乃其生平恨事余故特為補其闕米老三跋詭異飛動余幼時輒喜臨之余學米書從此起自後每為米書皆默擬此三跋筆法無不似者輒自謂腕有元章鬼亦可知用力深處便舉手得也禇河南雁塔聖教序董廣川稱河南書學逸少踈瘦徑錬不減銅筒等語此聖教序今在西安府南六百里慈恩寺塔下序記分兩石東西兩龕覆之序右行記左行序字差小記字差大蓋序書于永徽四年十月記書于十二月非一時故也評者謂此書如瑶臺青瑣窅映春林嬋娟美女不勝羅綺此僅得禇書之貌耳河南連諍立武昭儀引義極諫叩頭流血置笏于地曰還陛下笏此其骨幹與鐵石何異宜其筆法瘦徑如鐵線綰成所謂惟其有之是以似之評者但以輕弱相擬非知禇公者也按舊唐書公以永徽九年進封河南郡公尋坐事出為同州刺史三年徴拜吏部尚書則此記序乃是同州召還後所作其稱臣者郭引伯言以御製文非奉敕書是也序以十月書銜稱中書令記以十二月書銜改稱尚書右僕射意其代張行成為尚書右僕射在十月後而史不及詳也康熙己丑余授徒常州唐丈若營以舊本來蓋唐氏半園所藏也記完序闕一百三十八字以新拓補之壬寅劉庶常河南自陕還京師以一本見遺拓法精良墨光如漆惟左下方有十字微損耳餘皆絲髮完好如新刻成者余並珍之禇河南同州聖教序禇河南聖教序有三本行書一楷書二行書立石在懷仁集右軍書時二十餘年前為宋道君瘦金書之祖今已亡之惟二楷書尚在一在雁塔一在同州在雁塔者乃其原本在同州者則河南既殁後好事者以河南嘗刺同州故以雁塔本更刻一石以志甘棠不忘之義也按舊唐書遂良以永徽六年諫立武昭儀為后貶潭州都督顯慶二年轉桂州都督尋貶愛州刺史明年卒于愛州至龍朔三年去遂良之卒已五年矣其為後人覆刻無疑余嘗以兩本逐字對校結體無異唯筆法粗細不同當由覆刻者失真故耳王元美疑為遂良嘗書之至是始摹拓上石郭引伯疑為兩碑皆非公手書公歿後習禇者摹雁塔習歐者摹同州故各具一氣骨風韻趙子函又謂同州勝雁塔都是夢語玩後欵但記立碑年月不稱官爵至大唐禇遂良書在同州倅廳十一字并不復摹禇書古人質直明示此本為覆刻而觀之者皆不之省橫生多少間議論可發一笑余得萬厯間舊本糢糊不可奈及在亰師汪退谷以新拓一本遺余氊蠟既佳字尤清楚勝舊拓十倍問之退谷云曽至同州親為洗刷亭以覆之乃知唐人碑碣苟得好事者精意氊蠟皆可十倍舊拓惟恨陜人以惡煙粗紙率略拓賣以為衣食資則全汨本來耳退谷又言碑字刻法皆直下畫底皆方深得漢人手意然刻既精妙如此而傳摹反至失真何歟禇河南倪寬贊禇公倪寬贊墨迹曾於京師見之其用筆之妙具如拙存所言但謂其兩聖教遜此沈著則恐未是此之沈著易見彼之沈著難求正惟力透紙背故能離紙一寸沈著之至至於超絶乃為真正沈著也拙存尚未見及此耳余故特書于後為我拙存更下一砭附録拙存跋曰恭夀先生曾見禇公倪寬贊墨迹背臨一本示余姿態綽約余斂手拱視嘆為奇絶西至關中余亦幸得真迹寓目遂盡心摹之大約橫畫發筆以重取勢其收處輕圓意足鈎俱藏鋒若垂露波則用全力直出如刀削不使輕揚拖沓亦多燥墨至其點畫時帶𨽻意或細若絲髮而不弱或肥似肉勝而不滯應推河南第一奇迹但未知聖教二碑墨本又何如似彼飛動處太多反遜此沈著耳禇河南倪寬贊墨迹蒼巖梁相國所藏黃文獻揭伯防以下七跋皆亡之想其先為庸工剪去耳昔人論作書一須人品髙二須師法古三須用力徑貞觀中遂良官諫議大夫兼起居注文皇嘗問曰朕有不善卿亦記否對曰守道不如守官職在載筆君舉必書持此直亮風節故其為書外露柔間中含壬徑評者但目為瑤臺青瑣春林羅綺皮相之論也書法以人為本無其本而但效其書縱使無筆不似亦優孟衣冠耳學其書而得其所以書斯善學古人者矣中間刮去五字三為宏兩為玄玄者宋始祖諱宏者宋宣祖諱也去年八月九日稻兒生日以魯公自書告與之今年八月九日以禇中令倪寬贊與之俾合為一卷裝于顔告之前二公皆唐室藎臣足為來者法而中令世次先於顏公故也禇河南文皇哀册文皇哀册米虎兒以為河南書喬簣成但以為唐人書自宋潛溪以來俱如虎兒所鑒無復異説按河南書評者謂其如瑶臺嬋娟不勝羅綺此册折旋容止灑落藴藉有出塵之姿自非河南不能然玩其筆何其神似米老也米書出自河南豈元章嘗效之而虎兒遂題為河南以惑鑒者耶余出此語雖未敢遽以為定要之正自有見後有解人決不以余言為謬也禇河南隨清娛墓志銘河南此銘純祖蘭亭當時奉詔摹拓惟河南最多故隨筆流露如此余以辛卯秋得宋本於江寧承恩寺前乃吾家鬱岡祖本尋為陳生濳豈取去今以鬱岡本追摹其意臨之魏栖梧善才寺碑魏栖梧此碑涿鹿馮相國所藏題作禇河南曩嘗借玩十許日以其隱僻末由考證然按文義不能無疑遂書其後云前欵書河南禇遂良遂良錢塘人封河南郡公非河南人也可疑一也舊唐書遂良以永徽元年出為同州刺史三年徵拜吏部尚書顯慶三年卒於愛州至神龍改元遂良卒已四十八年矣可疑二也中宗即位建元神龍才兩年即改景龍無十一年可疑三也武后稱制後遂良之卒二十七年於時未有則天之號可疑四也碑云律師以大唐七年九月五日卒槩云大唐不名何年後有元開震驚等語元開二字文義不屬疑是開元當時作偽者亦心知開元年號與遂良不符故諱之而特錯亂其字耳可疑五也據此則此碑決非河南書然其筆法便娟秀腴真覺字裏金生行間玉潤酷似河南又淵字世字皆有闕筆的是唐人習禇者所書後來好事家以其迹似禇又不細考其世次本末但竄取碑字湊集成文而割裂他碑禇欵以便售利耳不然如碑中所不合處雖千百世後略識字人尚不應一誤至此況唐人乎又況禇河南乎今以此碑印之聖教雖筆法相似而聖教娟秀中有肅括意此則太縱逸矣余以其世所希有故特仍其舊臨此一本而為辨其偽如此涿鹿相國盛推此碑以為河南書未一二見特弗深考耳後以雍正六年八月二十七日閲趙明誠金石録第五卷目録云九百八十六唐文蕩律師碑下注盧渙撰魏栖梧正書開元十三年十月乃知此碑果非禇公書余之所疑一一是也遂改題為魏栖梧善才寺碑十載疑圑一旦氷釋為之大快禇河南髙士贊河南此碑世所未見余以康熙辛卯秋獲自金陵前輩何義門徐魯南兩先生見之嘆為希覯藏之篋笥幾二十年矣今日隂雨獨坐北窗臨此一本破悶僕以善才寺碑為非禇公書疑是後人集禇所作及閲趙氏金石録乃知果魏栖梧書竊謂此碑當亦猶是筆力短弱無禇公懸崖撒手遊行自在之趣風力又出善才下不獨永徽二年辛亥誤書甲寅為可見其謬也義門魯南一見深許特未暇深考耳唐朝散大夫陸柬之書陸司議為虞永興甥馮具區以為顔平原甥不直一笑也少時書學舅氏晚乃上法二王張懷瓘謂一覽未察窮研始精妙處可見此五言蘭亭詩蓋臨右軍者據澤卿蘭亭博議前尚有臨右軍蘭亭序惜不傳也此書開米老之先唐蕭瑀書蕭太保書唯淳熙祕閣續帖中有此一詩筆力腴健卷軸之氣流溢毫端史稱其愛經術善屬文乃詩思轉弱何歟豈唐初風氣未開雖愛經術者亦不能不為時所局乎余以其書特少故悉意臨之若其詩固不足録也唐孫思邈書孫華原人品髙潔不可榮以祿纍徵不起夀百餘歲神仙人也此兩行見於祕閣續法帖中想其丰裁超然有塵外之致魏晉以來門法入其手都無所用真是曠絶王方慶萬歲通天進帖唐摹萬歲通天進帖今藏武英殿曩在史館於入直時常得見之白麻紙雙鈎廓填精妙絶似一筆書無一毫痕迹真絶品也此卷有明嘉靖間藏錫山華氏勒石真賞齋摹拓精良為有明刻帖第一文氏停雲我宗鬱岡都從華本覆刻不逮遠甚江隂沈凡民草年前贈我火前初本擕入殿廷與墨迹細校絲毫不失今對真賞齋帖臨此卷如對真迹細意摹取矣按唐朝敘録神功元年五月上謂鳯閣侍郎王方慶曰卿家多書合有右軍遺迹方慶奏曰臣十代再從伯祖羲之書先有四十餘紙貞觀十二年太宗購求先臣並以進訖惟有一卷現在今進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寶五代祖騫髙祖規曾祖褒并九代三從伯祖晉中書令王獻之已下二十八人書共十卷並進上謂方慶曰此卿家世守奪之不仁乃命善書者廓填成卷仍命方慶正書標二十八人官世設九賓觀於武成殿而以墨迹卷還方慶仍令中書舍人崔融為寶章集以敘其事復以集賜方慶當時以為榮故竇臮述書賦有順天經而永保先業從人欲而不顧兼金之句臮説文衆辭與也從乑自聲其兾切嶽跋稱竇泉倦翁誤也此帖原二十八人今止存六人十帖己亡其二十有二其十帖中王僧虔已下兩帖帖存而題署已失尊體安和帖竟不知何氏書按董廣川寶章集跋當時方慶所集大小差次不能比櫛相倫隨其髙下廣狹為卷其後散落人間各復一一得之淳化所上帖已有雜出是集者元符中祕閣復以至道後逮紹聖間所購書摹石寶章集盡刻之故廣川據寶章集所刻取淳化祕閣兩帖標出别為一帖名之曰寶章集惜未見此集無能知為何帖他日倘得寶章舊本取淳化祕閣本盡摹之以還二十八人之舊亦大快事也李懷琳仿絶交書李懷琳所仿絶交書比於右軍則勢較縱逸矣然不失右軍門法其縱逸者時代為之其縱逸而不失則學力所到也右軍以後草書種子未亡賴有此耳張彥逺言昔嵇叔夜自書絶交書數紙人以右軍數帖來易惜不與之則叔夜自有書矣後跋二行有晉右軍字不知何人書則又目為右軍及讀竇臮述書賦則云乃有懷琳厥迹踈放假他人之姓氏作自已之形狀故黃伯思湯容庵諸公皆據此為懷琳仿書以至於今曽無異議然懷琳生於唐時不應有梁天監三年進入欵豈懷琳仿此并其後欵而仿之與疑不能眀也世既盡目以為懷琳書余亦姑仍其舊聊為此説用以存疑孫過庭書譜右軍以後無草書雖大令親炙趨庭之訓亦已非復乃翁門仭顛素以降則奔逸太過所謂驚蛇走虺勢入户驟雨旋風聲滿堂者不免永墮異趣矣孫虔禮謂子敬已下莫不鼓努為力標置成體內不足者勢外張匪直世降風移之故也余論草書須心氣和平斂入規矩使一波一磔亡不堅正乃為不失右軍尺度少一縱逸即偭規改錯惡道坌出米老譏顛素謂但可懸之酒肆非過論也隋唐以降惟永師千文孫虔禮書譜為得草書之正雖變化不及右軍而格律嚴謹無鼓努驚奔之態猶見中郎虎賁虔禮云沒草書種子絶矣往在天津見書譜真迹圓徑古雅逺出停雲館上余少參以右軍十七帖筆法臨此一本中有闕失處以武進橫野洲鄭氏本補足之於是書譜遂完世所傳虔禮草書有數種千文及景福殿賦皆妍媚不足録惟書譜甚有名於時曩于武進見橫野洲鄭氏本神清韻古為書譜石刻第一及見真迹雖字形不殊而精神全别不知當年刻本何遽異同若此豈或别有本耶後人臨摹故有不同也前題書譜卷上後語云撰成六篇分為兩卷意所謂六篇者乃是其譜今已亡之此特存其序論耳然書法微妙亦已宣泄殆盡學者但於此遜心求之即不得其門者或寡矣歐虞禇薛各得右軍之一體惟孫虔禮步趨不失尺寸所謂具體而微未達一間者也然歐虞諸公當文皇全盛時君臣賡和聲聞休暢虔禮少出虞禇之後及其學既成而文皇晏駕矣以此名出歐虞下豈其學遽弗及遇之幸不幸有數存焉耳然隋珠和璧光價豈與時增減書譜一卷至今與廟堂醴泉等碑並駕爭先到此覺時數失權物故自有真唐文皇論右軍謂煙霏霧結狀欲斷而還連鳯翥龍蟠迹似竒而反正正如春夏秋冬因時變易所以不激不隨而變化自足風規自逺有意求變即非能變元章謂張顛俗子變亂古法驚諸凡夫自有識者懷素平淡少到天成而時代壓之不能髙古虔禮去右軍未逺顛素未興繩尺步趨不失毫髮所以右軍風流未全歇絶猶日時之有閏雖不當節自得暄涼之正也從此求右軍乃可得門而入徑如鐵軟如綿須知不是兩語圓中規方中矩須知不是兩筆吾於書譜得之歐禇離紙一寸顔栁透過紙背惟右軍恰好到紙虔禮書譜其庶乎然不免著紙矣只緣少變化故或者云善學栁下惠莫如魯男子有右軍即不可無顛素循塗守轍正不如獨開生面也余謂魯男子正也栁下惠變之正也謂善學栁下惠莫如魯男子則可謂善學魯男子莫如栁下惠可乎歐虞以來皆能自闢新規不欲復存右軍一筆然皆變不失正如大令之於右軍不過稍加縱焉耳吾猶且少之至顛素則偭規矩而改錯矣抉破右軍十重圍欲自成一隊卒至草法湮絶為沿門擉黑者開先路實惟顛素之咎筆力能透紙背方能離紙一寸故知虞禇顔栁不是兩家書至筆力恰好及紙則須是天工至人巧錯天地中和之氣絪緼薈萃於指腕之間乃能得之有數存焉耳竇臮述書賦譏虔禮書千體一類一字萬同余按書譜之不及右軍不過少其變化耳若其步趨山隂則儼然登堂矣觀其前半筆力專謹直亦自擬右軍適嗣入後勢益縱逸韻益古雅豈惟渴驥遊龍直亦商彛周鼎矣余臨此凡三卷前兩卷得其專謹失其縱逸此卷乃并其古雅之趣而盡得之禪門所謂不求法脫不為法縛至此正未可以智巧爭已唐碧落碑碧落碑今在絳州髙祖第十一子韓王元嘉諸男為追薦其母房太妃所立者也尚書故實謂陳惟玉書洛中紀異録謂追薦像成忽二道士來自謂天下能篆書者李聽所為則扄户三日乃開化二白鶴飛去篆文宛然像背此説不經必訓兄弟當時欲神其説以驚衆故托為此言耳又世傳李陽冰覽之七日不忍去學之十二年不成亦不足據蓋後世淺陋之夫見其篆法奇古欲抑李監以張之實則任意雕巧筆力凡弱上壞三代古法下開後世惡道陽冰筆法直逼斯喜如此碑者正不足當其一笑乃肯坐卧其下乎碑名碧落李漢謂終於碧落故以為名今碑文完好可讀未嘗終於碧落字惟李肇所謂碧落觀者得之碧落觀至開元間始改名龍興寺也文初在天尊像背後乃别刻之石今像已亡所流傳者皆别刻本也元嘉六子碑止列四舊唐書稱潁川王訓早卒新唐書又稱上黨公諶早卒彼此互異蓋流傳誤耳唐狄仁傑書徐浩古迹記大足中則天太后賞納言狄仁傑能書仁傑曰臣自幼以來不見好本只率愚性何由能得則天乃內出二王真迹二十卷遣五品中使示諸宰相此孟冬帖乃梁公晚歲之作曽見二王墨妙故清挺超詣有黃庭樂毅風格梁公勳蓋天地忠貫日月雖不能書千載以後見其遺迹尚當拱璧奉之況其精妙有如此者乎張九齡告九齡唐賢相也開元草三年正月與裴耀卿李林甫同日柄用眀皇能知九齡之賢不能專心委任乃以林甫參雜其間可謂偵矣未幾九齡果遭貶而林甫晉爵晉國公君子小人薰蕕並列未有不為所擠者君實為之小人何有為之一慨徐季海書朱巨川告米氏書史書魯公朱巨川告後云又一告類徐浩書在邑人王衷處據此則米老但以為似徐書未遽以為季海也至鮮于困學始據宣和書譜斷然以為季海書董思白遂推為季海真得意作實則視其所書不空和尚碑才十得三四耳李陽冰謙卦篆學之亡四百餘年矣有明一代惟西涯李相國筆法圓健而不免傷肥文待詔能瘦差足步子昻後塵而風格緩弱無沈冥坱扎之意下逮趙寒山則俗氣撲面不可向邇矣吾嘗説谷口賊𨽻寒山賊篆世有解人定不河漢我言也篆書有三要一曰圓二曰瘦三曰參差圓乃徑瘦乃腴參差乃整齊三者失其一奴書耳史籕石鼓從心不踰篆書之聖也斯喜妙迹淪絶至唐李少溫上追孔轍下襲斯法篆學于是中起謙卦尤其奇絶之作運筆如蠶吐絲骨力如綿裹鐵舒元輿所謂蟲食鳥步鐵石隔壁龍池駴鮮鱗甲活動者于此見之壇山石刻適嗣也三十年來望而驚怖不敢涉筆今年新正息心閉關日摹數字竭半月之力始成此卷於少溫殘雪滴溜之妙頗有契處恨不能起少溫於九原一質正之李陽冰縉雲城隍廟碑縉雲城隍廟碑為陽冰有名之書歐陽公以為視陽冰他篆特為竒瘦趙子函亦云瘦細偉徑飛動若神顧世間傳本甚少今春正月江隂老友沈凡民過余九峰精舍云藏得一本急從借觀疏瘦圓徑果出三墳先塋等碑之上吾宗止言精摹一本毛髮惟肖余即以止言為粉本摹之五日不雨日字以為日篆法日從象形也古三切從口含一象口食物也以甘為日誤巔字上無山詩首陽之顛顛頂加山俗字又山宜作今作乃專豈等字之頭亦誤李陽冰慧山聽松二篆字按錫山志慧山寺有石床在殿前月臺下長可五尺廣厚半之上平可供偃仰故名石床頂側有聽松二篆字傳是唐李陽冰筆蒼潤有古色斷非陽冰不能唐皮日休詩殿前日暮髙風起松子聲聲打石床是也雍正六年三月余率同志往拓此書一時觀者列如堵墻蓋塵埋經久莫有過而拂拭者驟見捶拓故遂驚為盛事也右有楷跋十數行日久磨蝕不可復識悵悒良未有已李陽冰殘字右李陽冰殘字二種載淳熙續法帖中陽冰篆法直追斯喜顧在唐時已自殘闕失次不可多得如此淳熙續法帖最稱名刻而此二十六字乃不及陽冰他碑類帖多傳摹失真雖古刻亦不能免為可歎也唐經生書靈飛經靈飛經自宋元來不著至有明萬厯中始有名於時董思白深愛此書目為鍾可大每欲寫法華經必凝觀許時而後書之余按後欵稱大洞三景弟子玉真長公主可大生平未有斯號則知非可大書余得唐經生書三彌底部論于淮隂與此經字形筆法無毫髮異其非鍾可大書無疑又鍾書楊厯碑稱義男鍾紹京銘并書厯中官楊思勗父也可大身為宰相取媚閹人至以義父事其父可謂陋矣雖果出可大吾猶削之況決非是乎思白位髙名重妄以已意題署百餘年來無敢有異論余故特正其訛唐明皇紀泰山銘唐人𨽻書多尚方整與漢法異惟徐季海嵩陽觀碑明皇紀泰山銘為得漢人遺意孝經注肉重骨柔弗及也明皇以開元十三年九月禁奏祥瑞可謂得治理矣曽未數月遽有封泰山之舉先後截然如出兩人侈心一萌遂以釀成天寶之禍詩云相彼雨雪先集維霰泰山一舉蓋唐治亂之幾自此決之矣雖其銘辭未嘗不兢兢於多前功閟後患然方寸一動寢尋猖獗不可復救所謂毫末不治相尋斧柯君子以為貴謹其幾也是時張説創為此議導君于奢假使姚宋當國必無是舉用人一不當國之興廢以之可不慎乎碑在泰山之巔御製御書字大如掌摩崖勒石蓋自漢以來碑碣之雄壯未有及者曩在京時新建裘魯青遺我一本手自剪帖裝成卷册愛玩不舍下截糢糊百餘字當由歲久水土侵蝕或為樵夫牧豎所擊傷王元美以為拓工惡寒篝火燒殘竊意泰山髙寒冬時決不可拓必無篝火燒殘之理傍有蘇丞相頲東封頌閩人林㷆竊朱子忠孝廉節四大字為己書鐫刻其上以致損壞俗夫妄意留名徒博千古笑罵可恨可恨唐明皇批答裴耀卿等奏狀按唐史開元草二年冬十二月幽州節度使張守圭斬契丹主屈烈及可突汗上美守圭之功欲以為相張九齡諫阻之及明年裴耀卿等上狀請宣付史館勒碑作頌上顧不許豈有見於九齡之言故特加斂抑歟方是時楊氏未興王心未蕩故猶能因九齡之一言而功不自有如此此開元之治所以為盛而大臣之有益於國其功為大也奏狀三人銜名並列董氏戲鴻帖據狀末臣耀卿上狀之語獨標以為耀卿書臆決之論也唐自太宗崇尚書法當時大小臣工無不皆能書者此狀實兼有樂毅內景之長而於內景得之尤切何必專家即此便足名一世矣戲鴻刻本亦據淳熙續帖而字形大小不同首行五字脫失不省當年何據草率乃爾不可解也明皇批答之末有桓山之頌復在于兹之語見者不省所謂按王大令有桓山之頌梁天福元年洛陽修城得之碑裂不全止存桓山頌獻之銘六字刻絳帖中可按而得也明皇書出大令於桓山碑尤所攀仰曩見其孝經批答以為絶似桓山碑今見此答益信明皇行書果出桓山一點一拂無不適肖當時桓山之碑已不復全此書乃大似之故不覺沾沾自喜以為桓山之頌復在於兹耳汝帖唐初四家宋王宷輔道守汝州雜取各帖中篆𨽻行楷為十二卷多湊集殘斷不具首尾故黃長睿深詆之獨第十卷初唐四家首尾完具可觀此又氊蠟最古比之宋渡江以後諸刻圓徑有神采信可寶玩也唐李德裕與表弟書文饒相業大有可觀徒以威權太盛至於天子有顧我毛髮森竪之語宜其不克令終也及貶崖州不能義命自安乃抑鬱不自聊賴一至於此旋卒貶所實自為之又何尤焉東坡謫儋耳嘯歌自得卒致身名俱泰竟以夀終嗚呼彼獨非貶斥者哉顏魯公中興頌有唐一代碑版顏魯公最多率以雄厚勝獨中興頌及宋廣平二碑瀏漓頓挫態出字外臨書者正未可以輕心掉之也余為此書初尚雄快及細玩原刻乃知前者矜意太勝如子路初見夫子未為升堂弟子也智過於師方名得髓凡臨摹古人須令透一步翻一局乃得恰合所謂善學栁下惠莫如魯男子也余臨此碑正以不及一分為透過一步處世有解人必契余斯言顏魯公宋廣平碑并碑側記顔書多以沈雄痛快為工獨宋廣平碑紆餘佚蕩以韻度勝東坡元章皆謂顔書自禇出此碑尤覺全體呈露碑側記無意求工而規矩之外别具勝趣尤是顔書第一合作蓋前碑直入神品而碑側更居逸品矣史稱宋璟剛正過于姚崇元宗素所尊憚以璟之忠直而魯公為之碑兩公人品不殊并顔書可稱三絶然廣平以剛正得全而魯公竟以剛正為盧杞所忌至擠以死遇之幸不幸蓋有天焉而君臣遇合之難此亦可以觀矣按年譜顔公以大厯三年除撫州刺史時公年六十大厯七年九月除湖州刺史碑正書於七年九月除湖州刺史蓋當書碑時未有湖州之命也又六年當大厯十三年公由刑部尚書改吏部尚書時公年七十始有廣平碑側之記先是顔公以天寶八載遷殿中侍御史於時宋公第四子渾官中丞為御史吉溫所誣謫賀州欲請御製碑文緣此中止大厯五年十二月宋公第七子華之子儼以顔公嘗為中丞屬吏遂請製碑閲二年而公至東京除書未至居間多暇始為書之及刺湖州復製碑側記未及刻而宋公第八子衡復有沙州之謫至十二年十一月衡自吐蕃還朝明年春乃續書而刻之自大厯二年至十三年凡經九年而碑始完蓋廣平為人魯公所特矜重故於其碑也不憚詳書深考必至無有闕遺乃止非由宋公能持天下之正以佐唐中興焉得有此功在社稷名垂古今實自致之寧有幸乎按新史宰相世系表宋公八子與顔碑同舊史僅載其六而無復延又碑文八子俱載而但稱公有七子非緣筆誤當由復先公而卒故碑側亦稱第三子渾不稱四也而復稱第八子衡者公實有八子存者乃七數之則八核之則七也然公八子皆以贓私淫穢敗乃門閥廣平風教無復存者名有八子實竟無後自古名臣往往而然天道不可知一至于此豈不惜夫宋公有名無字新舊史皆同顔碑亦復闕如宋公為唐室名臣其孫屬魯公為之碑且碑之成在宋公之薨不過三十五年而其祖之字已不能舉如此不可解已按碑與史不同處碑稱父元撫贈户部尚書舊史作贈邢州刺史碑云俄拜朝散大夫新舊史俱無之碑云中宗將幸西京深雲北鄙乃兼檢校并州大都督府長史新史但云詔璟權檢校并州長史不稱將幸西京碑云四年遷吏部兼黃門監五年復兼侍中舊史則云官名改易為侍中碑云十三年駕幸東都新舊史俱作十二年又新史云東巡泰山不云駕幸東都更與舊史及碑文異碑云二十一年抗疏告老新舊史俱作二十年碑云其年駕幸洛陽舊史作二十二年駕幸東都凡此皆足以證史書之誤廣平勳業著日月威名冠宇宙顔碑名並典籍書儷篆籕較然在人耳目之前而互有異同如此碑側記所載三事皆於公大有關係而新舊史並闕之所未解已又碑文與集中不同處碑云夢大鳥銜書吐公口中而吞之集作吞之碑云異而召還集作后異而召還碑云貴近不宜與執政通問集作不宜與執法通同碑云公實佐奇謀集作其謀碑云中宗將幸西京集作元宗將幸西蜀碑云又為洛州長史集作尋入為洛州長史碑云東宫有大功主安得異議集本大功下多宗廟社稷主也六字碑云兼黃門監監修國史集本少一監字碑云五年復兼侍中集作改號侍中碑云明年駕幸洛陽集無駕字碑云以臣言免之集無言字碑云母寵子異集作母寵子愛碑云手詔優遂集作優許碑云佴公而歿集作躡公而歿又都穆金薤琳琅云建一言而天下倚平碑作一陽今碑正作一言欲優遊自免碑作優遊鄉里今碑正作自免左右震悚碑作天后震悚今碑作左右震悚敕使馳救之碑作馳赦今碑正作馳救公盛氣詰之碑作盛色今碑正作盛氣駕幸洛陽碑作駕達東都今碑正作洛陽幸字陽字猶髣佛可見馳道險隘行不得前碑作馳道險隘車騎不得前今碑正作馳道險隘行不前敕公覆按碑無敕字今碑正有敕字喪葬官供碑作器葬今碑正作喪葬戊寅歲五月碑無歲字今碑正有歲字義形言色碑作顔色今碑正作言色既遷鄴城碑遷作還今碑正作遷都氏之云皆與元碑不合按碑以宋寧宗五年范致君别刻一石都氏所見必范致君别刻本以其所見之非而轉疑元碑之是無端自生瘡痏良可笑也顔碑云開元十三年駕幸東都以公為西京留守新舊史本傳皆在十二年明年東巡泰山駕發東都蓋帝以十二年十一月幸東都十三年十月將封泰山遂發自東都耳碑蓋欲約而言之故但云駕幸東都也綱目載為西京留守於開元四年十二月按是年帝未嘗幸東都無用留守或以明年將幸東都故先以公為留守乎又公引年致政碑在二十一年新舊史本傳皆在二十年而舊史元宗紀仍在二十一年前後自相違反宋公始終右丞相綱目誤書左丞相新舊史及本傳公之拜右丞相在開元十七年綱目闕而不書俱是疏忽竹雲題跋卷三
