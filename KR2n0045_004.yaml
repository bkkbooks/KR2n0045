body:
  text: 竹雲題跋卷四吏科給事中王澍撰顔魯公東方朔畫像賛魏晉以來作書者多以秀勍取姿欹側取勢獨至魯公不使巧不求媚不趨簡便不避重複規繩矩削而獨守其拙獨為其難如家廟元静等碑皆其晚歳極矜練作也此碑書於天寳十三載距貞元元年七十有七為李希烈所害尚三十有二年則此為四十五歳時所作乃其盛年書故神明煥發而時出姿態不失清逺耳東坡謂魯公此碑字字臨逸少雖大小不倫而氣韻良是按右軍為王脩書東方朔畫賛脩死其母以其生平所愛納之棺中則知右軍書不傳久矣故常挺以為偽而董廣川亦謂後人為之託逸少以傳今觀魯公後記云取其字大可久不復課其工拙厚自謙抑明是自書又其文字與右軍所書多不同決知其非臨右軍書矣安世鳯墨林快事謂此碑久毁東明穆先生古搨重刻之故其斯立等字多譌據此則此碑今為重刻然較文選所載原文惟弃俗作棄世神交作神友耳此外絶無譌字不省安氏所云多譌者是何刻也或其所見是南渡後𣙜塲所市覆本亦未可知碑首兩額皆魯公所題闕安氏稱十二字古雅峻拔陽冰髙手所不及未免譽過其實此書方整實不及陽冰余以魯公篆𨽻絶少故并臨之東坡用墨如糊云須湛湛如小兒目精乃佳古人作書未有不濃用墨者晨興即磨墨升許以供一日之用及其用也則但取墨華而棄其滓穢故墨彩艷發氣韻深厚至數百年猶黒如漆而餘香不散也至董文敏以畫家用墨之法作書於是始尚淡墨雖一時韻味冲勝及其久也則黯黮無色矣要其矜意之書究亦未有不濃用墨者觀者未之察耳按舊唐書楊國忠怒公不附已出為平原太守平原去范陽不逺為禄山東戸是時禄山反兆已萌公託霖雨修城池料丁壯儲廩實乃陽會文士泛舟外池飲酒賦詩禄山以為書生易之遂不為防而竟為之所困此碑立于天寳十三載距禄山之反一載耳而斤斤為此不急之務大書深刻惟恐後時蓋即當時飲酒賦詩之意明示禄山以書生所急不過如此使禄山以為不足慮而後可圖大計耳蓋公之用意深曲一至於此千百載後覧此碑者但賞其書法之佳豈知公之苦心有不可明言者哉余故特表而出之使覽此碑者直當比于常山齒擊賊笏未可但以書目之也顔魯公送蔡明逺叙此書堅剛如鐵而用筆一正一偏釵脚屋漏之妙宣洩殆盡山谷極力追之不能得其仿彿余何人斯乃竟放筆效之無乃太不知量也歟按年譜乾元二年公年五十一六月自饒州移刺昇州充浙西節度使兼江寧軍使昇州即江寧郡也公與蔡明逺帖中及來江右中止金陵等語則知此帖當在是年公以去年十月刺饒州明逺即從趨事今來江右又復千里饋餉轉輸不絶公深徳之故有此序也顔魯公送劉太冲叙劉太冲帖碧牋書宋時為唐坰所收其子常語米老謂與智永千文栁公權等書同葬則世間已無此帖矣而董思翁跋又謂在趙中舍士楨家當時有宻為王詵購去之語豈果為晉卿所得故流傳至今耶又米氏書史稱坰將才不偶命而得其無隣九字剪去今此帖九字無恙獨闕首行五字不可解也蓋唐人善鉤摹或别有搨本亦未可定顔書多遒古釵脚屋漏之趣時時流露於行墨之間此叙獨秀潤有姿態為顔書最宜人之作余在京時曽臨一本以未能匠意毁去更臨之此序不記所作之年按序中有秦淮頂潮句溪春水之語亦當在刺江寧時公以乾元二年六月自饒州移刺江寧明年二月追為刑部侍郎在江寧者僅八月則知此序與送蔡明逺叙同時皆當在乾元二年也又序中言昔在平原拒胡羯而請與從事乃知公以平原刺史拒禄山時太冲實與有功而舊史但稱清河客李萼不及太冲非有此序則太冲一叚謀畧幾沒殺千古矣則知此序關係太冲不小非直移贈而已此序碧牋書碧牋宜墨故在顔書中獨為腴潤顔魯公乍奉辭帖此帖疑即報蔡明逺後帖所云乍奉辭者即前帖所謂指期斯復也承已過埭者即過邵伯南埭也惘然珍重者即所謂行李之間深宜尚慎也兩兩相印語意正同可指而數也蓋明逺於公為大有勞故於其去也丁寧反復不能自已如此魯公作人堅剛如鐵乃于朋友之間萬分委至故知千古真君子未有不近人情者也顔魯公乞米帖東坡謂魯公書細筋入骨如秋鷹此乞米帖真所謂細筋入骨者也與論坐書故當是一時所作寳晉英光集謂此帖挑踢太多無平淡天成之趣筆氣鬱結不條暢是逆旅所書愚謂此與争坐同皆圓勁古淡有游行自得之妙比於鹿脯馬病故是異流同源寳晉妄有軒輊恐非平允之論若其謂公學禇則可謂知公之深至以李太保為光顔則不直一笑矣顔魯公與李大夫乞米鹿脯馬病等帖寳晉英光集以李太保為光顔以穆宗初年加同中書門下平章事當公為刑部尚書時光顔名位尚微不得遽稱太保今考李光弼傳稱代宗即位拜太子太保正在廣德二年則此太保決知為光弼無疑也光弼為國元老盡力王室與魯公為氣類其從光弼乞米乞鹿脯宜其不厭于煩矣又按此數帖皆當在廣徳二年或永泰元年與論坐畧先後蓋永泰二年二月公便貶峽州别駕不得復稱刑部尚書矣顔魯公劉中使帖此帖與裴將軍書正同魯公忠義之氣出於天性故不覺色飛神動如此希烈醜奴乃欲屈鐵可恨可惜張丑清河書畫舫云顔真卿大字瀛洲帖為宋宣和御府故物元初藏張可興家後具王芝鮮于樞等六跋喬簣成題名嘉靖壬辰歸錫山華中甫文徵仲為之跋後歸檇李項氏康熈間錫山秦公子樹灃見于京師云字大如掌縱横遒古驚欲下拜今董氏戲鴻堂所刻字形差小王芝以下諸跋皆無之戲鴻所刻既拙惡又草率不復匠心一至於此今未見他刻僅據戲鴻堂臨之正未知有合否耳顔魯公論坐書稿魯公論坐書稿凡七紙北宋時在長安安師文家兄弟析産以前四紙作一分三紙及鹿脯帖作一分遂離為二黄山谷從師文借得後三紙於是仍合為一東坡稱其信手自然動有姿態比公他書尤為竒特山谷亦云竒偉秀拔奄有魏晉隋唐以來風流氣骨米元章云争坐位帖為顔書第一字相連屬詭異飛動得于意外蓋由當時義憤勃發意不在書故天真爛然自合矩度長安所摹石雖已泐然剥蝕之餘風骨未減不比戲鴻堂草率荒畧全體盡失也余自幼酷好此書數十年來臨寫百餘本畦徑之外輒有合處此本尤更可意神氣到來不殊我自作草也學魯公書須使盡氣力至於無所用力處乃見天則魯公争坐位帖氣格當與蘭亭並峙然蘭亭清和醇粹風韻宜人學之為易及既入手却不許人容易寫得非整束精神皎然如日初出却無一筆是處争坐奇古豪宕學之為難一旦得手即隨意所之無往不是此亦兩公骨格之所由分也此魯公與郭英乂書英乂為尚書右僕射封定襄郡王驕蹇泰侈隂事元戎魚朝恩以固其權時郭子儀大破吐蕃於長安朝臣徳之為興道之㑹英乂擠八座尚書坐朝恩下公移書糾正之年譜以此書在代宗廣徳二年按行狀公以肅宗寳應元年加上柱國廣徳元年加金紫光禄大夫是年十月吐蕃冦長安上幸陜州子儀擊却之十二月上還京師以魚朝恩為天下觀軍容使二年正月以公檢校刑部尚書三月進封魯郡開國公觀公自署銜及稱朝恩為軍容者與年譜正合則知此書正當在廣徳二年十一月蓋明年夏劔南節度使嚴武死英乂往代之即不復在京矣顧寧人金石文字記不知其年列此書于嚴書之後蓋未深考耳按米氏書史争坐帖是唐畿縣獄狀磓熟紙起草内小字是於行間添注不盡又於行下空紙邊横寫與刻本不同石刻麄存梗槩耳又袁清容集争坐真蹟京兆安師文嘗刻以傳世吴中復守永興以安氏石未盡筆法因再模刻今此二本世未之見所見惟關中刻耳如米氏言行列已非麄存梗槩不知真蹟妙處何如使人神往又不知安氏呉氏所刻比今關中本又何如或曰今闗中本即安氏所刻亦未知其是否也東坡初見安氏全帖手榻數十本袁清容得一本於東平王氏無纎毫失真旁用眉陽蘇氏及趙郡蘇軾印記米海嶽少時亦臨一本縫有元章戲筆字印亦為袁清容所得三十年前於金壇于氏青蓮社見一本筆法大似元章與關中本不類疑即袁氏本刻石者氊蠟精妙定是古搨惜未借臨為悵悒東坡本則未見附記于此亦可知坡書之與魯公其用力精勤如此宜其落筆輒合也顔魯公祭姪季明稿魯公三稿皆奇而祭姪稿尤為竒絶蓋泉明以公命購杲卿季明屍于洛陽河北杲卿僅得一足季明僅得一首魯公痛其忠義身殘哀思勃發故縈紆鬱怒和血迸泪不自意其筆之所至而頓挫縱横一瀉千里遂成千古絶調想爾時祭兄杲卿亦自有稿意其雄絶處正復不減惜今不傳耳明季墨跡在呉太學用卿家刻餘清帖中為祭姪刻本第一停雲館或云米臨非魯公筆也平生愛臨魯公三稿不惟喜其書以其可以發人忠孝之思故援豪濡墨輒覺腕底有魯公神至所謂古釵屋漏痕峻拔一角潛虚半股諸㣲妙不傳處筆墨之間自有契合正不足道也顔魯公告伯父稿山谷老人論争坐書猶不及祭濠州刺史之妙蓋一紙半書而真行草法兼備也弇州山人云此帖與祭季明姪稿法同而頓挫鬱勃少似遜之然風神奕奕則祭季明姪稿小似不及也按江村髙氏銷夏録此稿尚在人間余未之見所見惟淳熈續帖及吾家鬱岡帖刻本筆力婉弱殊不稱魯公風骨余參取論坐祭姪兩稿筆意臨之但未知果與真跡合否耳按留元剛年譜乾元元年公年五十歳三月除蒲州刺史先時杲卿妻妹兒女及泉明之子皆被賊拘囚流落河北至是公使泉明往求之九月得姪季眀首櫬故祭姪季明文有擕爾首櫬及兹同還之語尋為酷吏唐旻所誣以十月改饒州刺史至東京拜埽以骨肉歸京暨一門䘏贈告於濠州伯父濠州名元孫杲卿之父世稱祭伯者非也祭姪時刺蒲州故銜稱蒲州刺史告伯時改饒州刺史又行狀及新史皆稱封丹陽開國子而兩藁公所自署皆稱開國侯乃記載所誤當以公所自署為正顔魯公奉命帖唐史徳宗建中四年李希烈陷汝州盧杞建議遣公往宣慰之明年希烈僣偽號問儀于公公不為屈八月希烈縊殺公于蔡公有自汝移蔡帖未之見也公幽於汝蔡凡三年幾死者數矣義命自安始終不易及入龍興寺自度必死乃作遺表自為墓誌此帖所謂秪縁忠勤無有旋意中心悢悢始終不改者蓋其時書以明志之語也或者議公年踰七十不肯致政難以言智當是時唐室禍亂相仍殆無虚日又林甫盧杞相繼為相中外之勢危若累卵公以五十年舊臣不忍坐視其亡而寧以身殉此其心跡直與日月争光者也或又議公不死於希烈僣號之時至為希烈所殺以為公惜希烈之陷汝僣號等反耳公不死於僣號之時與不死于陷汝之日一也豈謂公於此時尚復有偷生畏死之心哉一日不死或者朝廷匡復尚可留其身以有為未可知也且建議遣公者杞也從杞遣公者徳宗也以宗社柱石之臣投之亂賊是魯公之死君相死之耳綱目大書顔真卿為李希烈所殺罪君相也按留元綱年譜魯公生於景龍元年己酉距貞元元年乙丑年七十有七因亮行狀亦云貞元二年八月二十四日希烈使景臻等害公於龍興寺年七十七令狐峘神道碑則云今上興元二年八月三日蹈危致命而碑末復云貞元初遇害舊史則云興元元年八月三日殺真卿然又云年七十也皆不合綱目從舊史而新史不載年月按公有自汝移蔡帖云貞元元年正月五日真卿自汝移蔡天也天之昭明其可証乎有唐之徳則不朽耳十九日書此公之自書者的的可據當以貞元元年八月李希烈害公於龍興寺年七十七為正至或云八月二十四日或云八月三日則無須深考矣卞氏所收偽魯公帖卞令之少司冦收魯公自江淮帖僕以劉太冲蔡明逺寒食等帖細意對較字字皆同則知此為好事者集魯公字雙鉤所成又其所收湖州帖筆法浮蔓少力亦屬好事者仿顔面貌而為之以便售利顔書雖率爾作草無不沈勁入骨此書殊不爾決知非魯公余此論似妄實有精鑒不虚也恐來學或未能識别聊復書之以麗於寒食帖後懷素帖懷素草書以小字千丈為最以其用力謹嚴猶不失晉人尺度次則藏真律公三帖飛動瘦勁天真爛然雖少縱於千文然謹嚴之意故在熊正不乏至于自叙則縱矣游絲連綿亦少頓折遂出藏真律公下然筆瘦神清狂縱中尚有肅括意下逮聖母雖規模大令故饒姿熊而體肥筆圓失其清逈故步外此今世所傳苦筍真跡亦當在藏真律公之間餘皆不足道矣懷素藏真聖母二帖素師書法出自大令而縱逸過之要其過處即其不足處凡用意外張者皆内不足而以氣凌者也蓋雖大令猶不能無憾況下此者乎此兩帖為素師生平合作而藏真尤清矯拔俗律以右軍之法誠不免如前所云要之天馬脫閑游絲獨裊故自神竒可愛矣唐李紳告公垂唐武宗相也以其短小精悍故世目之為短李㑹昌二年由淮南節度使拜中書門下平章事此其告也公垂分司東都厯河南尹故告有河南神明等語其尹河南政治剛嚴惡少逺遁故告有方嚴寡徒豪黠屏跡等語蓋亦當時才相也然威烈之過陷于刻暴至枉殺江都尉呉湘身殁以後竟坐湘寃子孫不振固其宜矣史稱進尚書右僕射門下侍郎告身無令又稱封趙郡公告但如舊封賛皇縣開國男耳恐史誤李北海少林寺戒壇銘北海書法原本大令而豪邁飛動態度過之此少林寺戒壇銘騰天淵之勢于分釐之間在北海碑刻中當居第一又末書伏靈芝刻乃北海所自鐫記托名者為當時絶矜重之作尤可寳也二十年前于淮隂程氏見一本雍正四年從老友蔣拙存行篋中得一本平生所購惟此而已唐歙州刺史葉慧明碑按慧明葉法善之父法善三世為道士有攝養占卜之術睿宗即位稱法善有㝠助之功故拜法善鴻臚卿封越國公又贈其父為歙州刺史碑所謂有開必先大啟聖猷者是也撰文書碑名字俱泐𨽻法清瘦頗類御史臺精舍碑不合東漢筆法然僕之所惡于今之為𨽻者正以不得漢人風骨徒以襲其形貌耳此碑風骨爽勁正喜其于漢人之外别樹赤幟何必公相沿襲千手一同乎趙徳甫金石録第五卷目葉慧明碑下注韓擇木撰并八分書今此碑分書頗類擇木然前欵撰文者載江夏李書碑者載國子監太學生明是兩人非出一手又江夏李三字尚存決知非韓所撰書碑名姓俱泐然徳甫既誤以兩人為一又焉知所謂韓擇木者不亦為一時率爾誤書者乎唐李商隱書月賦率更書法多尚脩長行書為甚義山此書出自率更而比于率更尤覺長而踰制蓋自魏晉來無有如此書者義山作人絶跌宕不可繩以禮法書亦猶爾余於此聊為書中増一殊觀楊少師神仙起居法右楊景度書神仙起居法八行真跡在范一齋總制家乃其先大司馬公所遺曩余在京於林笏齋出以示余摹得一本并虎兒髙宗商左山三跋皆摹之後尚有留丞相文待詔二跋則未及摹也景度甚有名於宋山谷推為散僧入聖為魯公後一人余竊謂景度險勁有餘尠明和悅暢之氣蓋其生當亂世氣習纎仄未暇仰觀先聖賢典型但以其資質所近筆力所到走入狹小一路故僅可比之散僧入聖至於典謨訓誥清廟明堂氣象則未或有後來王荆公全學其書宜其見訶於紫陽先生也景度書流傳甚少但據所見真跡聊復臨之以備五季時書法至步虚詞意實不喜之故不復臨也宋髙宗臨蘭亭此宋思陵所臨以較潁上本無毫髪之異蓋臨潁本也潁本闕二十七字此僅闕五字後有思陵御押思陵行九而押為五蓋取易飛龍九五之意曩在京師從儼齋大司農公借得宋本初見以為潁上觀後御押知是思陵所臨因絶人事摹得之宋游丞相景仁藏蘭亭百卷内有一卷為思陵臨賜向子諲者行列比定武本為寛字亦極圓潤攄適蓋其自運本也此卷筆筆規模禇公不惟形似并其神韻而具得之吾嘗說潁上為禇摹褉帖第一此本又思陵臨潁上第一明眼人必能契余斯語米臨蘭亭此米老所摹亦拙存老友得自秦中者黄文獻公稱其貌不必同意無少異衡山云當求于牝牡驪黃之外董文敏公則云絶無本色乃與禇摹相類乍屬目以為貞觀時物三公之論不同如此余昨摹禇本定為米老所作今摹米本益信非謬蓋其摹禇時意在於禇不規規求似所以神完氣足無所不似故斤斤摹倣無遊行自在之趣反覺未為神似蓋彼則意勝于法而此則法勝於意故也此惟老於書法者知之非吾解人未易窺此語米元章顔魯公碑隂老米書魯公碑隂即學魯公宋廣平碑湥勁秀拔在米老書中别是一種風格與山谷夷齊廟碑全非二老本色故並著之余曽見魯公碑隂墨蹟超妙入神以較刻本筆力十倍再四追摹不能及其萬一益信古人神妙無方非後來所能彷彿跂望前良殊増慚愧魯公為盧杞所忌遣使希烈幽囚汝蔡者殆三年終不屈以死此其義烈真可與日月争光者也元章痛其死乃為仙去之語以攄其憤懣之思用意良善然吾獨以為大失魯公之心當希烈遣縊魯公時偽傳有㫖公神色不變徐問㫖自何日來京師及告言至自希烈乃云此賊耳此其志操定之已久豈復有偷生之志考魯公平生頗溺老佛常時或從陶八八學神仙之術亦未可知及其使希烈一出一入動以義命自安蓋舉平時所為神仙者至此已盡付之浮雲矣藉使果得仙去吾猶將諱之以成公之志節況事理之所必無哉元章不識大義乃以無稽小說大書深刻誣衊昔賢可謂偵矣若其書法深勁則吾曩時所謂學魯公宋廣平碑者得之恐來者愛其書誤信其說故不可以不辨米元章蜀素真跡蜀素卷呉郡邵氏造於慶厯甲申閱二十五年至熈寧戊申邵子中始跋其尾又閲二十年至元祐戊辰米元章始為之書計自甲申始造至戊辰中更四十五年邵子裝褫藏之特為珍重至米元章自謂腕有羲之鬼遂不復讓此卷明季為呉用卿所藏董文敏以諸名蹟易之戲鴻堂所刻先據摹本入石故其字跡各小分許曩在京師從儼齋大司農借觀風神秀拔仙姿絶世去戲鴻堂本萬倍為米老行書第一展玩旬日不能釋手歸來追摹其意臨此一卷米老以蜀素余以呉紈且行數適合無餘無欠豈亦有數存其間耶米老書此卷自謂腕有羲之鬼余臨此卷亦自謂腕有元章鬼矣聖教自有院體之目故有宋一代無稱道者然蘇米諸公往往𨼆用其筆法而米老尤多乃其平生絶未嘗一字道及所謂鴛鴦繡了從教看不把金鍼度與人也此卷實筆筆從聖教來余臨寫之次恍然有契特為拈出不使千百世後為古人所欺亦是一適祝京兆書他人書千紙一同惟祝京兆紙各異態字各異勢平生無有同者僕推京兆書為有明第一為此也然往往縱逸處多肅括處少不免為沿門擉黒者開先路此則京兆之病此卷圓美中有肅括意縱横馳騁而不失繩墨乃京兆書之絶矜鍊者中亦有一二漫筆不免帶本來習氣要之自是京兆合作余見京兆書以百數此故當為甲觀也篆書謙卦家人卦卑以自牧威如以閑家所以修身齊家之道備而天下之理得矣自世教裒微道法息滅整身無檢律家無則以放恣為髙明以䙝嫚為和順縱心所如往而不反失身滅倫必基于此矣詩曰相彼雨雪先集維霰始之不謹漸必隳之可不戒乎余拈此二卦非以為書為整身律家者閑也其用篆者物理其本明不敢易也伊川云作字須用敬篆律尤嚴毛髪有忽全體具廢知此義者可以語學矣一凖小篆變化自生至於參差俯仰一中矩度斯亦可為守禮自得者之一方也圎潤和明仁也中規合矩禮也布分整飭義也變動不居知也凖律有恒信也五徳具備舉而措之無施不當矣不止一身一家之治矣至由此而悟書法行楷草章直如馳驟康莊耳僕論書法有意求變即匪能變少温書謙卦謙字數十兼用大小篆不足又以􅠗為謙雖字各異體然未免有意求變所以變盡輒窮絳雲在霄化工肖物所以萬古不同者無心於變也作書但因時舒卷即變化具足何事研同較異逐字推排乃始為變乎至於結體最患方整長短大小字各有態因其自然而與為俯仰一正一偏錯綜在手所以能盡百物之情狀少溫謙卦如征四等字必欲擴而大之亦未免排比有跡余為此書一用小篆字不求變然筆之所如興與意㑹既定視之自無同者質之解人其謂我何如也十種千文按董廣川書跋梁武帝得右軍遺書命殷鉄石搨一千字每字一紙雜碎無序因令周興嗣次為韻語當其成時一夕鬚髪盡白自謂心力竭於此書帝甚重之詔令蕭子雲寫進今蕭本世不復傳惟隋僧智永所書真草八百本散施江東諸寺者至今僅存一二而宋大觀間薛嗣昌所刻㝡烜赫有名世所傳為鐵門限者是也自唐以來名能書者多以字各不同體制盡備可以自見筆力故書千文者不可一二計然智永僅得真草二種趙子昻文徴仲亦僅得篆𨽻行楷四種雍正四年夏余假還二泉道經䢴上吾友汪君竹廬囑書篆𨽻真行草千文各二種每種一自運一臨古共十種為古今千文獨開生面且曰將為余勒之石余遂欣然竭兩年之力以踐斯諾既成各以李少温筆法篆題其顛字各異態不欲復存永師一筆匪敢自異前規聊用取新來學耳篆書第一篆學絶於有明李懷麓傷肥文徴仲傷弱其餘諸家純以綿力搘柱尠有能届精華者至趙寒山父子則俗韻逼人不可向邇篆法之陵遲至斯極矣余嘗說篆法有三要一曰圓二曰瘦三曰參差圓乃勁瘦乃腴參差乃整齊三者失其一奴書耳石鼓操縱在手從心不踰篆書之聖不敢仰攀斯喜遺跡亦復淪絶惟李少温上追史籕下挹斯喜足為篆法中權余學之三十年略得端緒每作一字不敢以輕心掉之必正襟危坐用志不分乃敢落筆竟此一本凡經半月心力殫瘁乃僅成之陽明言良知非白非黒乃正是赤余之所書亦當作如是觀耳臨元呉孟思集詛楚第二元呉睿字孟思濮陽人劉誠意稱其篆筆初若不經意而動合矩度趙文敏吾子行不能過余在京時新建裘友人魯青以其集詛楚千文一卷贈余筆柔如綿力勁如鐵能於古人法外别開一徑而規矩繩削變不失正篆之逸品也余臨此卷參取太公九府圜法筆思不必盡用孟思而斟酌損益不過十存一二於孟思不傳之妙筆墨之外正有水乳之契前卷守正此卷盡變合兩而觀亦可以得篆法已𨽻書第三張彦逺法書要録論𨽻書云長豪秋勁素體霜妍摧峯劍折落㸃星懸𨽻雖變繁趨易要其用筆必沈勁痛快斬釘截鐵而後可以為書故吾衍三十五舉有方勁古拙如折刀頭方是漢𨽻書體之語自鄭谷口出舉唐宋以來方整氣習盡行打碎專以漢法號召天下天下靡然從之每見方整書不問佳惡便行棄擲究竟谷口𨽻書僅得漢人之一體且用筆多以弱豪描其形貌於古人秋勁霜妍星懸劍折之妙去之殊逺所謂楚則失矣齊亦未為得者也余於𨽻書未嘗一二為之而心知其意略仿西嶽華山碑筆法為此書以就正有道亦不欲更墮谷口五里霧耳臨文待詔𨽻書第四有明一代𨽻書前有全室叟後推文待詔全室承趙文敏遺烈作書古淡猶有前人風韻文待詔專以觚稜斬截為工則去古法愈逺矣余稍以漢魏法臨待詔使就簡勁即其觚稜不煩繩削自然淵渾透過一步乃適得其正凡臨古人不可不解此法楷書第五余嘗說晉唐小楷經宋元來千臨百摹不惟筆妙銷亡并其形似都失惟唐人碑刻去真蹟僅隔一紙雖剥蝕過半而其存者猶可見古人妙處余自少酷愛臨率更醴泉銘得宋搨本悉意臨仿凡千百過後得蘭臺道因法師碑雖覺風骨太露要自同源異流的然率更血派也此本以率更為骨參以蘭亭使其結體駘宕峻而不削潤而不流多力豐筋是固前人所矜尚也臨歐陽率更楷書第六此楷書千文蓋後人集率更字成者董文敏不能鑒别刻之戲鴻帖中且摹勒拙惡全乏率更手意余謂醴泉銘率更書之極軌也以醴泉筆法臨率更又臨率更之善則也此本取千文之形模追醴泉之風韻有契與否識者必能鑒之行書第七蘭亭聖教行書之宗千百年來十重鐵圍無有一人能打碎者雖米元章自謂腕有羲之鬼卒亦莫能拔竒於前古之外余所見蜀素真蹟卷為其平生第一合書然究其根株實筆筆原本聖教彼雖不言其源流所自固可覆按者也余平生學米最深於蜀素卷尤有微契此卷亦彷彿得之臨歐陽率更行書第八往在京師曽見率更行書千文墨蹟風稜峻峭有不可犯之色閱已即卷以去未能摹也丙午春老友蔣拙存自秦中摸取以來不覺撫掌稱快率更楷法峻削而中具和明之韻故為唐人第一獨其行書不免風骨太露如吏事帖及千文皆帶本家習氣仲氏雄冠終未得為升堂弟子也余以其楷法筆意臨此書使其觚稜稍歸平淡取其意而不襲其貌臨古之善則也草書第九右軍草書獨絶千古子敬則已縱至於顛素則奔逸太過去之愈逺孫䖍禮謂子敬以下莫不鼓努為力標置成體不刋之論也草書須以楷法為之一㸃一拂皆斂入規矩乃是右軍適嗣妄意使才至於脈興血作夏雲竒峰公孫劍器雖云神逸實乃過則之論也余為草書一以十七帖為宗兼取絶交書譜淳化諸帖毋令偭規改錯不墨守規矩無以致神明臨古者知之臨薛道祖草書第十有宋蘇米四家各以逸足馳騖藝苑惟薛道祖墨守晉人成法無少踰越雖才力超軼不及蘇米然自唐以來能得晉人心法者道祖一人而已曩在京師見其千文真跡全法蕭子雲意其時子雲書跡尚未冺滅故得悉意為之今子雲之書不可見見道祖此卷猶是中郎虎賁何義門先輩嘗言章草於今不可書恐字體不備不免率意撰寫取戾方家道祖此書上援鍾索下開二宋信是子雲適嗣究其源流何嘗一筆無來厯乎跋自臨皇甫明公碑後昔人謂有唐一代楷書歐陽率更第一率更碑版化度寺醴泉銘為最二碑在宋時便已剥蝕佳搨絶不易致令人有甘井先竭之嘆世所傳皇甫明公碑用筆結體較二碑為少遜然完字尚多略存率更面目余嘗見舊拓數本肥不賸肉瘦不賸骨蕭爽秀潤與近搨本絶異世之學是碑者或失之板滯或失之寒峭皆未得其妙處所在也余臨此卷意欲追取信本精神而自愧工力淺弱不能少異流俗尚當悉力求之存此以自勗云爾竹雲題跋卷四
